<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bug Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bug Tracker</h1>
        <form id="bugForm">
            <input type="text" id="title" placeholder="Bug Title" required>
            <textarea id="description" placeholder="Bug Description" required></textarea>
            <button type="submit">Add Bug</button>
        </form>

        <h2>Bug List</h2>
        <div id="bugList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
